packages:
  "@supabase/supabase-js": "Database, Auth, and Realtime communication"
  "framer-motion": "Page transitions and micro-interactions"
  "react-hook-form": "Form state management"
  "@hookform/resolvers": "Zod validation for forms"
  "zod": "Schema validation"
  "date-fns": "Date formatting for PRs and chat"
  "clsx": "Utility for conditionally joining classNames"
  "tailwind-merge": "Utility to merge Tailwind classes without style conflicts"
  "lucide-react": "Icons for the UI"

images:
  - path: "artifacts/fortify/public/images/hero-bg.png"
    description: "Abstract high-contrast dark athletic background, deep black with glowing electric orange and icy blue neon light streaks, intense fitness gym atmosphere, cinematic dramatic lighting"
    aspect_ratio: "16:9"

notes:
  - "App connects to a user-supplied Supabase project using VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY"
  - "No backend API server; fully serverless frontend Architecture utilizing Supabase RLS policies"
